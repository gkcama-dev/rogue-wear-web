<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Discover premium streetwear by Rogue Wear Sri Lanka.">
    <title>Rogue Wear | Premium Streetwear & Graphic Tees Sri Lanka</title>
    
    <script>
        try {
            const savedTheme = localStorage.getItem('rogue_theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        } catch (e) { console.warn('Theme read failed in head:', e); }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link rel="stylesheet" href="assets/css/style.css?v=1.3">
    
    <style type="text/tailwindcss">
        @theme {
            --font-syne: 'Syne', sans-serif;
            --font-outfit: 'Outfit', sans-serif;
            --font-jakarta: 'Plus Jakarta Sans', sans-serif;
            --color-brand-purple: #240433;
            --color-brand-pink: #FF3B97;
            --color-brand-dark: var(--color-bg-dark);
            --color-brand-light: var(--color-bg-light);
            --color-brand-card: var(--color-card-bg);
            --color-brand-border: var(--color-card-border);
            --color-brand-gray-bg: var(--color-gray-bg);
        }
    </style>
</head>
<body class="bg-brand-light text-brand-dark font-jakarta antialiased selection:bg-brand-pink selection:text-white">

    </body>
</html>
