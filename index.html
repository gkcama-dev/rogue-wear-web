<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Discover premium streetwear by Rogue Wear Sri Lanka.">
    <title>Rogue Wear | Premium Streetwear & Graphic Tees Sri Lanka</title>

    <script>
        try {
            const savedTheme = localStorage.getItem('rogue_theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        } catch (e) { console.warn('Theme read failed in head:', e); }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="assets/css/style.css?v=1.3">

    <style type="text/tailwindcss">
        @theme {
            --font-syne: 'Syne', sans-serif;
            --font-outfit: 'Outfit', sans-serif;
            --font-jakarta: 'Plus Jakarta Sans', sans-serif;
            --color-brand-purple: #240433;
            --color-brand-pink: #FF3B97;
            --color-brand-dark: var(--color-bg-dark);
            --color-brand-light: var(--color-bg-light);
            --color-brand-card: var(--color-card-bg);
            --color-brand-border: var(--color-card-border);
            --color-brand-gray-bg: var(--color-gray-bg);
        }
    </style>
</head>

<body class="bg-brand-light text-brand-dark font-jakarta antialiased selection:bg-brand-pink selection:text-white">
<header class="fixed top-0 inset-x-0 h-20 glass-nav z-40 transition-all duration-300">
        <div class="max-w-[1536px] mx-auto px-6 h-full flex items-center justify-between gap-4">
            <button id="mobile-menu-btn" class="lg:hidden p-2 text-brand-dark hover:text-brand-pink transition-colors" aria-label="Open Mobile Menu">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
            </button>

            <a href="#" class="font-syne text-2xl font-bold tracking-tight text-brand-dark">
                ROGUE<span class="text-brand-pink font-light italic">WEAR</span>
            </a>

            <nav class="hidden lg:flex items-center gap-8 text-sm font-outfit font-medium tracking-wide">
                <a href="#" class="px-4 py-1.5 bg-black text-white rounded-full">Home</a>
                <a href="#categories" class="sliding-underline hover:text-brand-pink transition-colors">Categories</a>
                <a href="#shop" class="sliding-underline hover:text-brand-pink transition-colors">Shop Drops</a>
                <a href="#footer" class="sliding-underline hover:text-brand-pink transition-colors">Contact</a>
            </nav>

            <div class="flex items-center gap-4 sm:gap-6">
                <button id="theme-toggle-btn" class="p-2 text-brand-dark hover:text-brand-pink transition-colors cursor-pointer" aria-label="Toggle Theme">🌙</button>
                <button id="nav-search-btn" class="p-2 text-brand-dark hover:text-brand-pink transition-colors cursor-pointer">🔍</button>
                <button id="nav-cart-btn" class="p-2 text-brand-dark hover:text-brand-pink relative cursor-pointer">🛍️ <span class="cart-count-badge absolute -top-1 -right-1 bg-black text-white text-[9px] font-bold w-4.5 h-4.5 flex items-center justify-center rounded-full hidden">0</span></button>
            </div>
        </div>
    </header>

    <div id="scroll-progress" class="fixed top-20 left-0 h-1 bg-brand-pink z-50 w-0 transition-all duration-75"></div>

    <div id="drawer-overlay" class="fixed inset-0 bg-black/60 z-40 hidden backdrop-blur-sm"></div>

    <div id="cart-drawer" class="fixed top-0 bottom-0 right-0 max-w-md w-full bg-brand-light border-l border-brand-border z-50 p-6 flex flex-col justify-between transform translate-x-full transition-transform duration-300">
        <div>
            <div class="flex items-center justify-between pb-6 border-b border-brand-border">
                <h4 class="font-syne font-bold text-lg text-brand-dark">🛍️ Shopping Cart</h4>
                <button id="close-cart-btn" class="text-gray-400 hover:text-brand-pink">✕</button>
            </div>
            <div id="cart-items-list" class="overflow-y-auto max-h-[60vh] mt-4">
                </div>
        </div>
        <div id="cart-summary-box" class="border-t border-brand-border pt-6 hidden">
            <div class="flex justify-between font-bold text-brand-dark mb-4"><span class="font-syne">Total Amount</span><span id="cart-total">LKR 0</span></div>
            <button onclick="checkoutCart()" class="w-full bg-brand-dark hover:bg-brand-pink text-brand-light font-syne font-bold text-xs uppercase py-4 rounded-xl transition-all cursor-pointer">Proceed to Secure Checkout &rarr;</button>
        </div>
    </div>
</body>

</html>
